name: US Market Monitor Alerting

on:
  schedule:
    # 每天 21:00 - 04:00 (台灣時間) 每 30 分鐘執行一次 (對應 UTC 13:00 - 20:00)
    # cron: '*/30 13-20 * * 1-5'
    # 簡單一點，半小時一次，全天候或特定區段
    - cron: '*/30 13-21 * * 1-5'
  workflow_dispatch: # 允許手動觸發

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagic1

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Monitor
        env:
          STOCK_BOT_EMAIL: ${{ secrets.STOCK_BOT_EMAIL }}
          STOCK_BOT_PWD: ${{ secrets.STOCK_BOT_PWD }}
          GAS_URL: ${{ secrets.GAS_URL }}
        run: python us_market_monitor.py
