name: Portfolio Monitor Alerting

on:
  schedule:
    # 每天台灣時間 09:00 (UTC 01:00) 執行一次
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許手動觸發

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagic1

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Monitor
        env:
          STOCK_BOT_EMAIL: ${{ secrets.STOCK_BOT_EMAIL }}
          STOCK_BOT_PWD: ${{ secrets.STOCK_BOT_PWD }}
          GAS_URL: ${{ secrets.GAS_URL }}
        run: python portfolio-tracker/gas3.py
